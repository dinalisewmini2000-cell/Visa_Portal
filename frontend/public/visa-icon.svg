<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Passport Cover -->
  <rect x="96" y="48" width="320" height="416" rx="32" fill="#002b5e"/>
  
  <!-- Australia 7-pointed star (Commonwealth Star) -->
  <polygon fill="#ffffff" points="256 112 265 140 294 140 270 157 279 185 256 168 233 185 242 157 218 140 247 140"/>

  <!-- Visa Stamp / Seal -->
  <circle cx="256" cy="272" r="64" fill="none" stroke="#d4af37" stroke-width="8" stroke-dasharray="12 6"/>
  <circle cx="256" cy="272" r="52" fill="none" stroke="#d4af37" stroke-width="4"/>
  <text x="256" y="286" font-family="Arial, sans-serif" font-weight="bold" font-size="32" fill="#d4af37" text-anchor="middle">VISA</text>

  <!-- Passport Text -->
  <rect x="176" y="384" width="160" height="8" rx="4" fill="#d4af37"/>
  <rect x="208" y="408" width="96" height="8" rx="4" fill="#d4af37"/>
</svg>
